name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-apple-darwin,aarch64-apple-darwin,x86_64-pc-windows-msvc

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Install cross-compilation tools
        run: |
          cargo install cargo-zigbuild --locked
          cargo install cargo-xwin --locked

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace

      - name: Build Linux x64
        working-directory: packages/rivet
        run: pnpm exec napi build --target x86_64-unknown-linux-gnu --release -x

      - name: Build Windows x64
        working-directory: packages/rivet
        run: pnpm exec napi build --target x86_64-pc-windows-msvc --release -x

      - name: Build macOS x64
        working-directory: packages/rivet
        run: pnpm exec napi build --target x86_64-apple-darwin --release -x

      - name: Build macOS ARM64
        working-directory: packages/rivet
        run: pnpm exec napi build --target aarch64-apple-darwin --release -x

      - name: Build CLI
        run: cargo build --release --bin rivet

      - name: Test
        run: cargo test --workspace
