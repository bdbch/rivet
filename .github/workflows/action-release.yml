name: Release GitHub Action

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic action version without the leading v, for example 1.0.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semantic version: $VERSION"
            exit 1
          fi

      - name: Create action release tags
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release GitHub Action v$VERSION"
          git push origin "v$VERSION"
          git tag -fa v1 -m "Update GitHub Action v1" "v$VERSION"
          git push origin v1 --force

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release create "v$VERSION" --title "GitHub Action v$VERSION" --generate-notes
