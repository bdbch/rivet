[package]
authors = ["Dominik Biedebach <dominik@bdbch.com>"]
edition = "2024"
name    = "rivet"
version = "1.0.0-alpha.5"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "rivet"
path = "src/main.rs"

[dependencies]
clap        = { version = "4", features = ["derive"] }
glob        = "0.3"
indexmap    = { version = "2", features = ["serde"] }
inquire     = "0.7"
napi        = "3.0.0"
napi-derive = "3.0.0"
rand        = "0.8"
semver      = "1"
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
serde_yaml  = "0.9"
thiserror   = "2"
time        = { version = "0.3", features = ["formatting"] }

[dev-dependencies]
tempfile = "3"

[build-dependencies]
napi-build = "2"
