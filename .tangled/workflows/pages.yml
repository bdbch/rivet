when:
  - event: ['push', 'manual']
    branch: ['main']

engine: 'nixery'

dependencies:
  nixpkgs/nixpkgs-unstable:
    - nodejs_24
    - pnpm
    - gnused
    - openssh

environment:
  CI: 'true'

steps:
  - name: 'Install Node dependencies'
    command: pnpm install

  - name: 'Build static site'
    command: pnpm --filter docs build

  - name: 'Verify static output'
    command: test -f apps/docs/out/index.html

  - name: 'Push to tangled-pages branch'
    command: |
      # Tangled CI only has origin via HTTPS. Pushes require SSH.
      # Extract the repo path from the HTTPS URL and convert to SSH format.
      REMOTE_URL=$(git remote get-url origin)
      # e.g. https://knot1.tangled.sh/did:plc:.../  →  git@tangled.org:did:plc:...
      REMOTE_URL="git@tangled.org:${REMOTE_URL#https://*/}"
      REMOTE_URL="${REMOTE_URL%/}"
      cd apps/docs/out
      git init
      git checkout --orphan tangled-pages
      git add -A
      git config user.name "tangled-bot"
      git config user.email "bot@tangled.sh"
      git commit -m "deploy: ${TANGLED_COMMIT_SHA:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
      git remote add origin "$REMOTE_URL"
      git push origin tangled-pages --force
