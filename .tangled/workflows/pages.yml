when:
  - event: ['push', 'manual']
    branch: ['main']

engine: 'nixery'

dependencies:
  nixpkgs/nixpkgs-unstable:
    - nodejs_24
    - pnpm
    - gnused

environment:
  CI: 'true'

steps:
  - name: 'Install Node dependencies'
    command: pnpm install

  - name: 'Build static site'
    command: pnpm --filter docs build

  - name: 'Verify static output'
    command: test -f apps/docs/out/index.html

  - name: 'Push to tangled-pages branch'
    command: |
      cd apps/docs/out
      git init --initial-branch=tangled-pages
      git add -A
      git config user.name "tangled-bot"
      git config user.email "bot@tangled.sh"
      git commit -m "deploy: $TANGLED_SHA"
      git remote add origin "$TANGLED_REPO_URL"
      git push origin tangled-pages --force
